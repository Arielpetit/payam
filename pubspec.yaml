name: payam
description: "Payam - Modern African Digital Wallet & Payment Platform"
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.5.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0

  # NFC & Hardware
  nfc_manager: ^3.5.0
  local_auth: ^2.3.0
  vibration: ^2.0.0
  audioplayers: ^6.1.0
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Networking
  web_socket_channel: ^3.0.1
  http: ^1.2.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/sounds/
